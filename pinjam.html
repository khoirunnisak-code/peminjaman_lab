<!DOCTYPE html>
<html>
<head>
    <title>Pinjam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2>Pinjam Barang</h2>

    <form method="POST">

        <label>Pilih Barang</label>
        <select class="form-control mb-3" name="id_barang">
            {% for b in barang %}
                <option value="{{ b[0] }}">
                    {{ b[1] }} (Stok: {{ b[2] }})
                </option>
            {% endfor %}
        </select>

        <input class="form-control mb-3" name="jumlah" type="number" placeholder="Jumlah">

        <button class="btn btn-success">Pinjam</button>
    </form>

</div>

</body>
</html>
